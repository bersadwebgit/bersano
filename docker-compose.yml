services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shop-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: shop_final
    # پورت 5432 عمداً حذف شده — دیتابیس فقط داخل Docker network در دسترس است
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shop-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # پورت 6379 عمداً حذف شده — Redis فقط داخل Docker network در دسترس است
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    container_name: shop-redis-http-proxy
    restart: always
    # پورت 8079 عمداً حذف شده — فقط سرویس web دسترسی دارد
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${SRH_TOKEN}
      SRH_CONNECTION_STRING: "redis://:${REDIS_PASSWORD}@redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: shop-web:latest
    container_name: shop-web
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/shop_final?schema=public"
      UPSTASH_REDIS_REST_URL: "http://serverless-redis-http:80"
      UPSTASH_REDIS_REST_TOKEN: "${SRH_TOKEN}"
      DISABLE_AUTO_BALE_BOT: "true"
      DISABLE_AUTO_TELEGRAM_BOT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      serverless-redis-http:
        condition: service_started
    networks:
      - internal

  bale-bot:
    image: shop-web:latest
    container_name: shop-bale-bot
    restart: unless-stopped
    command: ["node", "scripts/bale-bot.js"]
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/shop_final?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - internal

  telegram-bot:
    image: shop-web:latest
    container_name: shop-telegram-bot
    restart: unless-stopped
    command: ["node", "scripts/telegram-bot.js"]
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/shop_final?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
